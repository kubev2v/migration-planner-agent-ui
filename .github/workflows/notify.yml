name: Notify planner repo
on:
  push:
    branches:
      - main
      - stable

jobs:
  wait-for-image:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Quay.io image
        run: |
          IMAGE="quay.io/redhat-user-workloads/assisted-migration-tenant/migration-planner-agent-ui"
          TAG="${GITHUB_SHA}"
          TIMEOUT=3600
          INTERVAL=10
          ELAPSED=0

          echo "Waiting for $IMAGE:$TAG to be available..."

          while [ $ELAPSED -lt $TIMEOUT ]; do
            if podman pull "$IMAGE:$TAG" > /dev/null 2>&1; then
              echo "Image $IMAGE:$TAG is available!"
              exit 0
            fi

            echo "Waiting for image $IMAGE:$TAG... ($ELAPSED s / $TIMEOUT s)"
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          echo "Timeout reached: image $IMAGE:$TAG is still not available."
          exit 1

  notify:
    needs: wait-for-image
    uses: kubev2v/migration-planner-workflows/.github/workflows/repo-dispatch-notify.yml@main
    with:
      event-type: agent_ui_updated
    secrets:
      APP_ID: ${{ secrets.MIGRATION_PLANNER_SYNC_APP_ID }}
      APP_PRIVATE_KEY: ${{ secrets.MIGRATION_PLANNER_SYNC_APP_PRIVATE_KEY }}
